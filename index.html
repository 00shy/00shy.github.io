<style>

  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    gap: 24px;

    opacity: 0;
    animation: fadeIn 1.2s ease-out forwards;
  }


  .logo {
    display: block;
    width: min(90vw, 500px);
    height: auto;
    max-height: 180px;
    object-fit: contain;

    animation: logoFloat 1.4s ease-out forwards;
  }

  .socials {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(18px, 4vw, 28px);
    flex-wrap: wrap;
  }

  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;

    width: 48px;
    height: 48px;
  }

  .socials a svg {
    width: clamp(28px, 5vw, 34px);
    height: clamp(28px, 5vw, 34px);
    fill: #fff;
    transition: transform .25s ease, fill .25s ease;
  }

  .socials a:hover svg {
    fill: #ff4fd8;
    transform: scale(1.1);
  }

  footer {
    width: 100%;
    border-top: 1px solid #111;
    padding: 10px 0;
  }

  marquee {
    color: #666;
    font-size: 12px;
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    .container {
      gap: 20px;
      padding: 16px;
    }

    .logo {
      width: min(92vw, 420px);
    }

    .socials a {
      width: 52px;
      height: 52px;
    }
  }

  @media (max-height: 600px) {
    .container {
      gap: 16px;
    }

    .logo {
      max-height: 120px;
    }
  }
  
  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  @keyframes logoFloat {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

</style>
</head>
