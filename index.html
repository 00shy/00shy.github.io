<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bio Site</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    text-align: center;
    padding: 40px 20px;
  }

  .logo {
    width: 500px;
    height: 250px;
    background: #111;
    border: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .socials {
    display: flex;
    gap: 25px;
  }

  .socials a svg {
    fill: white;
    transition: 0.25s ease;
    width: 34px;
    height: 34px;
  }

  .socials a:hover svg {
    fill: #ff4fd8;
    transform: scale(1.1);
  }

  footer {
    width: 100%;
    background: #000;
    border-top: 1px solid #111;
    padding: 10px 0;
  }

  marquee {
    color: #666;
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
